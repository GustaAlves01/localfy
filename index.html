<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localfy</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="titles">
        <h1 class="title">Localfy</h1>
        <h4 class="subtitle">Download spotify playlist easily</h4>

        <input class="input" type="text" placeholder="Set the playlist url">
    </div>
    
    <script src="./front.js"></script>
</body>
</html>
