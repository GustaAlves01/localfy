<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localfy</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="titles">
        <h1 class="title">Localfy</h1>
        <h4 class="subtitle">Easily download spotify playlists</h4>
    </div>

    <form action="/submit" method="post" class="principal">
        <div class="buttons">
            <button type="button" name="playlistBtn" class="playlistBtn pButton">Playlist</button>
            <button type="button" name="profileBtn" class="profileBtn pButton">Profile</button>
            <button type="button" class="singleBtn pButton">Music</button>
        </div>
        <input class="input" type="text" name="url" placeholder="Set the playlist url">
        <button type="submit">submit</button>
    </form>
    
    <script src="./front.js"></script>
</body>
</html>
